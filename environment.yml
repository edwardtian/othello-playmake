name: othello-ai
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy
  - scipy
  - pip
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu128
    - torch==2.11.0+cu128
    - torchvision==0.26.0+cu128
    - torchaudio==2.11.0+cu128
    - fastapi>=0.110.0
    - uvicorn[standard]>=0.29.0
    - websockets>=12.0
    - pydantic>=2.6.0
    - python-multipart
    - pytest>=8.0.0
    - pytest-asyncio>=0.23.0
    - tqdm
    - tensorboard
    - requests
    - httpx
