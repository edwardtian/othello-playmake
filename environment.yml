name: othello-ai
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy
  - scipy
  - pip
  - pip:
    - torch==2.5.1+cu121
    - torchvision==0.20.1+cu121
    - torchaudio==2.5.1+cu121
    - fastapi>=0.110.0
    - uvicorn[standard]>=0.29.0
    - websockets>=12.0
    - pydantic>=2.6.0
    - python-multipart
    - pytest>=8.0.0
    - pytest-asyncio>=0.23.0
    - tqdm
    - tensorboard
    - requests
    - httpx
