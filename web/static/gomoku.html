<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gomoku AI Playground</title>
    <link rel="stylesheet" href="css/gomoku_style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Gomoku AI Playground</h1>
            <p class="subtitle">Play 5-in-a-row against a self-learning AI</p>
        </header>

        <div class="game-controls">
            <div class="mode-selector">
                <label>Game Mode:</label>
                <select id="gameMode">
                    <option value="human-black">Play as Black (you start)</option>
                    <option value="human-white">Play as White</option>
                    <option value="ai-vs-ai">Watch AI vs AI</option>
                </select>
            </div>
            <div class="checkpoint-selector">
                <label>AI Model:</label>
                <select id="checkpointSelect">
                    <option value="">Default (untrained)</option>
                </select>
                <button id="loadCheckpointBtn" class="btn secondary">Load</button>
            </div>
            <button id="newGameBtn" class="btn primary">New Game</button>
            <button id="aiMoveBtn" class="btn secondary" disabled>AI Move</button>
        </div>

        <div class="game-info">
            <div class="score">
                <span class="black-dot"></span> Black: <span id="blackScore">0</span>
            </div>
            <div class="turn-indicator">
                Turn: <span id="turnIndicator">Black</span>
            </div>
            <div class="score">
                <span class="white-dot"></span> White: <span id="whiteScore">0</span>
            </div>
        </div>

        <div id="board" class="board">
            <!-- Cells generated by JS -->
        </div>

        <div id="gameOver" class="game-over hidden">
            <h2 id="winnerText"></h2>
        </div>

        <div class="thinking-panel hidden" id="thinkingPanel">
            <h3>AI Thinking</h3>
            <div id="thinkingMap" class="thinking-map"></div>
            <div class="thinking-value">
                Position Value: <span id="thinkingValue">0.00</span>
            </div>
        </div>
    </div>

    <script src="js/gomoku_app.js"></script>
</body>
</html>
